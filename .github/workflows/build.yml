name: "Build and Cache"
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Claude Code Version"]
    types:
      - completed
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Only run if not triggered by workflow_run or if the workflow succeeded
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      env:
        NIX_FIRST_BUILD_UID: 400

    - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      if: github.ref == 'refs/heads/main'
      with:
        name: claude-code
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Build claude-code
      run: nix build .#claude-code -o result --print-build-logs

    - name: Push to Cachix
      if: github.ref == 'refs/heads/main'
      run: nix build .#claude-code --json | jq -r '.[].outputs.out' | cachix push claude-code

    - name: Test claude-code
      run: ./result/bin/claude --version
